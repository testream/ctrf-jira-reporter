name: Example CTRF CLI Upload Workflow with Testream Reporter for Jira

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

concurrency:
  group: ctrf-tests
  cancel-in-progress: true

jobs:
  test:
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run pytest and generate CTRF report
        # --ctrf writes the CTRF JSON to ctrf/ctrf-report.json.
        # The -p no:cacheprovider flag keeps CI output clean.
        # pytest exits with code 1 when tests fail, so we use
        # continue-on-error to ensure the upload step always runs.
        run: python -m pytest --ctrf ctrf/ctrf-report.json -p no:cacheprovider
        continue-on-error: true

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Upload results to Testream
        # Reads the CTRF JSON generated by pytest-json-ctrf and uploads it
        # to Testream so results appear in your Jira workspace.
        #
        # Add TESTREAM_API_KEY as a repository secret:
        #   Settings → Secrets and variables → Actions → New repository secret
        #
        # branch, commit-sha, repository-url, build-number, and build-url are
        # auto-detected by @testream/cli from the GitHub Actions environment.
        run: |
          npx @testream/cli \
            --report-path ctrf/ctrf-report.json \
            --api-key "$TESTREAM_API_KEY" \
            --test-tool pytest \
            --app-name ctrf-jira-reporter-example \
            --app-version "${{ github.sha }}" \
            --test-environment ci \
            --test-type unit \
            --fail-on-error
        env:
          TESTREAM_API_KEY: ${{ secrets.TESTREAM_API_KEY }}
